<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PGO 2026 | A Tradition Unlike Any Other</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,700&family=Inter:wght@400;900&display=swap" rel="stylesheet">
    <style>
        body { background-color: #021a11; font-family: 'Inter', sans-serif; color: white; }
        .serif { font-family: 'Playfair Display', serif; }
        .pgo-gold { color: #FFD200; }
        .masters-green { background-color: #006747; }
        /* Smooth scrolling for when we add more sections */
        html { scroll-behavior: smooth; }
    </style>
</head>
<body class="overflow-x-hidden">

    <nav class="fixed top-0 w-full p-6 flex justify-between items-center z-50 backdrop-blur-md bg-black/20 border-b border-white/5">
        <div class="flex items-center space-x-3">
            <img src="Vector .jpg" alt="PGO Logo" class="h-12 w-12 object-contain border border-emerald-500/30 rounded-full bg-white/10 p-1 shadow-lg shadow-emerald-900/20">
            <div class="hidden md:block font-black tracking-tighter text-xl italic uppercase">
                PGO<span class="pgo-gold">.2026</span>
            </div>
        </div>
        <div class="space-x-6 text-[10px] md:text-xs uppercase tracking-[0.3em] text-zinc-300 font-bold">
            <a href="#field" class="hover:text-yellow-400 transition-colors">The Field</a>
            <a href="#champions" class="hover:text-yellow-400 transition-colors">Champions</a>
            <a href="#gallery" class="hover:text-yellow-400 transition-colors">The Gallery</a>
            <a href="#" class="hover:text-white bg-emerald-800/80 px-4 py-2 rounded-full border border-emerald-400/30">Live Stats</a>
        </div>
    </nav>

    <main class="min-h-screen flex flex-col items-center justify-center relative pt-20">
        
        <div class="absolute inset-0 opacity-30 pointer-events-none">
            <div class="absolute top-[-10%] left-[-10%] w-[60%] h-[60%] bg-emerald-600 rounded-full blur-[150px]"></div>
            <div class="absolute bottom-[-10%] right-[-10%] w-[60%] h-[60%] bg-yellow-700 rounded-full blur-[150px]"></div>
        </div>

        <div class="relative z-10 text-center px-6">
            <p class="text-emerald-400 uppercase tracking-[0.6em] text-[10px] font-black mb-6">Bryant University Alumni • Class of 2011</p>
            
            <h1 class="serif text-5xl md:text-8xl italic mb-4 leading-tight">
                The Papa Gino's <br>
                <span class="pgo-gold not-italic font-black tracking-tighter uppercase text-6xl md:text-9xl">Open 2026</span>
            </h1>
            
            <div class="flex items-center justify-center space-x-4 mb-12">
                <div class="h-[1px] w-12 bg-emerald-800"></div>
                <p class="text-zinc-400 font-light text-sm tracking-widest uppercase">Est. 2014 • A Major Tradition</p>
                <div class="h-[1px] w-12 bg-emerald-800"></div>
            </div>

            <div class="flex flex-col md:flex-row gap-4 justify-center">
                <button class="masters-green text-white px-12 py-5 font-bold uppercase tracking-[0.2em] rounded-sm hover:brightness-125 transition-all shadow-xl">
                    Enter The Field
                </button>
                <a href="https://photos.app.goo.gl/b2kLSWHWbLoKANfy8" target="_blank" class="bg-white/5 border border-white/10 text-white px-12 py-5 font-bold uppercase tracking-[0.2em] rounded-sm hover:bg-white hover:text-black transition-all">
                    2025 Archives
                </a>
            </div>
        </div>

        <div class="absolute bottom-0 w-full bg-black/80 backdrop-blur-xl border-t border-emerald-900/40 py-4">
            <div class="flex items-center">
                <div class="bg-yellow-500 text-black px-4 py-1 text-[10px] font-black uppercase italic ml-6 skew-x-[-12deg]">LIVE UPDATES</div>
                <marquee class="text-white text-xs font-bold uppercase tracking-widest ml-6 opacity-80">
                    PGO COMMITTEE REVIEWS 2026 PURSE... HANDICAPS UNDER SCRUTINY... BARRETT FAVORED TO REPEAT... NO SLICE LEFT BEHIND...
                </marquee>
            </div>
        </div>
    </main>

</body>
</html>
